<div class="login-wrapper">
  <!-- <div class="row">
    <div class="col-md-6"> -->
      <div class="card">
        <div class="text-center">
          <h1>Sai Balaji Society Login Portal</h1>
          <h5>You can login here!</h5>
        </div>

        <!-- (1) Reactive Form Binding -->
        <!-- [formGroup] → Angular Reactive Forms -->
        <!-- (ngSubmit) → Angular Event Binding -->
        <form [formGroup]="loginForm" (ngSubmit)="logIn()">

          <div class="mb-3">
            <label class="form-label">Email address</label>

            <!-- (2) FormControl Binding -->
            <!-- formControlName → Angular Reactive Forms -->
            <input formControlName="email"
                   type="email"
                   class="form-control"
                   id="exampleInputEmail1"
                   placeholder="Email address">
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>

            <!-- formControlName → Angular Reactive Forms -->
            <input formControlName="password"
                   type="password"
                   class="form-control"
                   id="exampleInputPassword1">
          </div>

          <!-- Normal HTML button but used inside Angular form -->
          <button type="submit" class="btn btn-primary">Login</button>

        </form>

        <!-- (3) Angular Routing -->
        <!-- routerLink → Angular Router Navigation -->
        <div class="d-flex justify-content-between mt-3">
          <a style="color: blue; cursor: pointer;" routerLink="/signup">
            New User? Sign up
          </a>
          <a style="color: blue; cursor: pointer;" routerLink="/forgot-password">
            Forgot Password?
          </a>
        </div>

      </div>
    <!-- </div>
  </div> -->
</div>
