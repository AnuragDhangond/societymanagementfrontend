<div class="accounts-dashboard">

  <h2 class="page-title">Accounts Dashboard</h2>

  <!-- SUMMARY CARDS -->
  <div class="cards-container">

    <div class="card">
      <h3>Total Income (Maintenance)</h3>
      <p>₹ {{ totalIncome | number }}</p>
    </div>

    <div class="card">
      <h3>Total Expenses</h3>
      <p>₹ {{ totalExpenses | number }}</p>
    </div>

    <div class="card">
      <h3>Current Balance</h3>
      <p>₹ {{ currentBalance | number }}</p>
    </div>

  </div>

  <!-- QUICK LINKS -->
  <div class="quick-links">
    <button routerLink="/accounts/income" class="btn">Income Book</button>
    <button routerLink="/accounts/expense" class="btn">Expense Book</button>
    <button routerLink="/accounts/ledger" class="btn">Ledger Book</button>
    <button routerLink="/accounts/balance" class="btn">Balance Sheet</button>
  </div>

  <div class="charts-container">

    <!-- LINE CHART -->
    <div class="chart-box">
      <h3>Income vs Expenses (Monthly Trend)</h3>
      <canvas id="lineChart"></canvas>
    </div>

    <!-- PIE CHART -->
    <div class="chart-box">
      <h3>Expense Category Distribution</h3>
      <canvas id="pieChart"></canvas>
    </div>

  </div>

</div>
