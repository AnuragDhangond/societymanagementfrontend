<div class="main-content">

  <div class="table-wrapper">
    <div class="table-container">

      <table class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Society Member Name</th>
            <th>Society Member Email</th>
            <th>Member Flat Number</th>
            <th>Member Phone Number</th>
            <th>Wing</th>
            <th *ngIf="isAdmin">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let data of allMemberData; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ data.name }}</td>
            <td>{{ data.email }}</td>
            <td>{{ data.address }}</td>
            <td>{{ data.mobile }}</td>
            <td>{{ data.services }}</td>

            <td *ngIf="isAdmin">
              <button
                class="btn btn-info"
                (click)="onEditMem(data)">
                Edit
              </button>&nbsp;

              <button
                class="btn btn-danger"
                (click)="deleteMem(data._id)">
                Delete
              </button>
            </td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="exampleModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Member Records</h5>
        <button type="button" class="btn-close" (click)="onClose()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="formValue">

          <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" formControlName="name">
          </div>

          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>

          <div class="mb-3">
            <label>Flat Number</label>
            <input type="text" class="form-control" formControlName="address">
          </div>

          <div class="mb-3">
            <label>Phone</label>
            <input type="number" class="form-control" formControlName="mobile">
          </div>

          <div class="mb-3">
  <label>Wing</label>
  <select class="form-select" formControlName="services">
    <option value="">Select Wing</option>
    <option value="Wing A">Wing A</option>
    <option value="Wing B">Wing B</option>
  </select>
</div>


        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="onClose()">Close</button>

        <button
          *ngIf="showAdd && isAdmin"
          class="btn btn-primary"
          [disabled]="formValue.invalid"
          (click)="addMember()">
          Add
        </button>

        <button
          *ngIf="showBtn && isAdmin"
          class="btn btn-primary"
          [disabled]="formValue.invalid"
          (click)="updateMem()">
          Update
        </button>
      </div>

    </div>
  </div>
</div>
