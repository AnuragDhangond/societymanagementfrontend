<div class="notice-container">

  <h2>Society Notices</h2>

  <!-- ADMIN ONLY -->
  <div class="add-notice-box" *ngIf="role === 'admin'">
    <h3>Add Notice</h3>

    <input
      type="text"
      placeholder="Notice Title"
      [(ngModel)]="title"
    />

    <textarea
      placeholder="Notice Description"
      [(ngModel)]="description"
    ></textarea>

    <button (click)="addNotice()">Add Notice</button>
  </div>

  <!-- NOTICE LIST -->
  <div class="notice-list">
    <div class="notice-card" *ngFor="let notice of notices">
      <h4>{{ notice.title }}</h4>
      <p>{{ notice.description }}</p>
      <span>{{ notice.createdAt | date:'dd-MM-yyyy' }}</span>
    </div>

    <p class="no-notice" *ngIf="notices.length === 0">
      No notices available
    </p>
  </div>

</div>
